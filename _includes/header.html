{%- include data.liquid -%}

<header class="retro-header">
  <div class="retro-header-inner">
    {% comment %} <a href="{{ home_url }}"><img class="retro-header-img" src="{{ '/assets/images/rawfeed.png' | relative_url }}" width="40" height="40" alt="logo"/></a> {% endcomment %}
    <div>
      <h1 class="retro-header-title"><a href="{{ home_url }}">{{ header_.title }}</a></h1>
      <p class="retro-header-desc">{{ header_.description }}</p>
    </div>
  </div>
</header>

<div class="retro-banner-bar">
  <marquee behavior="scroll" direction="left" scrollamount="2">{{ options.title }} — {{ options.tagline }}</marquee>
</div>
